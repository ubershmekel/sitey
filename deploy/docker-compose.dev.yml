# Dev override — runs server AND web in Docker with source mounts for hot reload.
# Also supports running only Caddy in Docker while server/web run on host.
#
# Usage (from repo root):
#   npm run dev:docker
#
# To rebuild after adding dependencies:
#   npm run dev:docker -- --build

services:
  caddy:
    volumes:
      - ./caddy/Caddyfile.dev:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - ${DATA_ROOT:-./data}/projects:/srv/projects:ro
    ports:
      - "80:80"
      - "443:443"
      # Expose admin API for host-run server mode (npm run dev).
      - "2019:2019"
    extra_hosts:
      # Required on Linux so host.docker.internal resolves from containers.
      - "host.docker.internal:host-gateway"

  sitey-api:
    build:
      context: ../server
      dockerfile: Dockerfile
      target: dev
    environment:
      PORT: 3001
      DATABASE_URL: file:/data/sitey.db
      DATA_ROOT: /data
      LOG_LEVEL: debug
      JWT_SECRET: dev-insecure-change-me-in-production
      CADDY_ADMIN_URL: http://caddy:2019
      SITEY_WEB_INTERNAL: sitey-web:3000
    volumes:
      - ../server/src:/app/src:ro
      - ../server/prisma:/app/prisma:ro
      - ${DATA_ROOT:-./data}:/data
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      caddy:
        condition: service_started
      sitey-web:
        condition: service_healthy

  sitey-web:
    build:
      context: ../web
      dockerfile: Dockerfile.dev
    volumes:
      - ../web/src:/app/src:ro
      - ../web/public:/app/public:ro
      - ../web/index.html:/app/index.html:ro
      - ../web/vite.config.ts:/app/vite.config.ts:ro
    environment:
      # Tells the browser to connect HMR WebSocket to port 80 (through Caddy)
      # instead of Vite's internal port 3000 which isn't exposed
      VITE_HMR_CLIENT_PORT: 80
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 120s # npm install on first run can be slow
    networks:
      - sitey-public
