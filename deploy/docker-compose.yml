# ─── Networks ─────────────────────────────────────────────────────────────────
networks:
  sitey-public:
    name: sitey-public
    driver: bridge
  sitey-internal:
    name: sitey-internal
    driver: bridge

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  caddy_data:   # TLS certs + Caddy state
  web_dist:     # Built Vue SPA files, populated by sitey-web init container

# ─── Services ─────────────────────────────────────────────────────────────────
services:

  # ── Sitey Web (init container — builds once, then exits) ──────────────────
  sitey-web:
    build:
      context: ../web
      dockerfile: Dockerfile
    volumes:
      - web_dist:/srv
    restart: "no"

  # ── Caddy (reverse proxy + static file server + automatic HTTPS) ───────────
  caddy:
    image: lucaslorentz/caddy-docker-proxy:ci-alpine
    restart: unless-stopped
    depends_on:
      sitey-web:
        condition: service_completed_successfully
    ports:
      - "80:80"
      - "443:443"
    environment:
      CADDY_INGRESS_NETWORKS: sitey-public
      CADDY_DOCKER_CADDYFILE_PATH: /etc/caddy/Caddyfile
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - caddy_data:/data
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - web_dist:/srv:ro
    networks:
      - sitey-public

  # ── Sitey API ─────────────────────────────────────────────────────────────────
  sitey-api:
    build:
      context: ../server
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - caddy
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: file:/data/sitey.db
      DATA_ROOT: /data
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - ${DATA_ROOT:-./data}:/data
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - sitey-public
      - sitey-internal
