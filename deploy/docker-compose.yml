version: "3.9"

# ─── Networks ─────────────────────────────────────────────────────────────────
networks:
  sitey-public:
    name: sitey-public
    driver: bridge
  sitey-internal:
    name: sitey-internal
    driver: bridge

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  caddy_data:   # TLS certs + Caddy state

# ─── Services ─────────────────────────────────────────────────────────────────
services:

  # ── Caddy (reverse proxy + automatic HTTPS) ───────────────────────────────────
  caddy:
    image: lucaslorentz/caddy-docker-proxy:ci-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      CADDY_INGRESS_NETWORKS: sitey-public
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - caddy_data:/data
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
    networks:
      - sitey-public

  # ── Sitey API ─────────────────────────────────────────────────────────────────
  sitey-api:
    build:
      context: ../server
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - caddy
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: file:/data/sitey.db
      DATA_ROOT: /data
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - ${DATA_ROOT:-./data}:/data
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - sitey-public
      - sitey-internal

  # ── Sitey Web ─────────────────────────────────────────────────────────────────
  sitey-web:
    build:
      context: ../web
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - sitey-api
    networks:
      - sitey-public
    # No labels needed — routing is defined in Caddyfile above.
