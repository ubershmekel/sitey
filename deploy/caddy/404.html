<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 Not Found</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        background: #0f0f0f;
        color: #e5e5e5;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100dvh;
        padding: 2rem;
      }
      .card {
        text-align: center;
        max-width: 420px;
      }
      .code {
        font-size: 6rem;
        font-weight: 800;
        line-height: 1;
        color: #3b82f6;
        letter-spacing: -0.05em;
      }
      h1 {
        font-size: 1.5rem;
        font-weight: 600;
        margin-top: 0.75rem;
        color: #f5f5f5;
      }
      p {
        margin-top: 0.75rem;
        color: #888;
        font-size: 0.95rem;
        line-height: 1.6;
      }
      code {
        background: #1a1a1a;
        border: 1px solid #333;
        border-radius: 4px;
        padding: 0.15em 0.4em;
        font-size: 0.85em;
        color: #ccc;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="code">404</div>
      <h1>Page not found</h1>
      <p>
        No route matches <code>{{placeholder "http.request.orig_uri"}}</code> on
        this host.
      </p>
    </div>
  </body>
</html>
