<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Site Pending Deployment</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family:
          ui-sans-serif,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: #f4f6fb;
        color: #0f172a;
      }
      main {
        width: min(680px, calc(100% - 2rem));
        box-sizing: border-box;
        padding: 2rem;
        border: 1px solid #cbd5e1;
        border-radius: 14px;
        background: #ffffff;
      }
      h1 {
        margin: 0 0 0.75rem 0;
        font-size: 1.5rem;
      }
      p {
        margin: 0;
        line-height: 1.5;
        color: #334155;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Deployment in progress</h1>
      <p>After a successful deploy, your site will be available here.</p>
    </main>
  </body>
</html>
